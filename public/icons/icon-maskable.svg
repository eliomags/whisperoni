<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Maskable variant: glyph sits inside the inner 80% safe area so Android adaptive
       cropping (circle, squircle, rounded square) doesn't clip it. The outer 10% on each
       side is full-bleed background only. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#5a2030"/>
      <stop offset="55%" stop-color="#3a141d"/>
      <stop offset="100%" stop-color="#1a0810"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3c98e"/>
      <stop offset="50%" stop-color="#d8a86a"/>
      <stop offset="100%" stop-color="#b88a4a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Inner safe area: 80% = 410px centered. Glyph sized for 256px center+balance. -->
  <text x="256" y="335"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="500"
        font-size="268"
        fill="url(#gold)">W</text>
</svg>
