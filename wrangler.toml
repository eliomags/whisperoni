name = "whisperoni"
main = "src/worker.js"
compatibility_date = "2026-05-28"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true   # Worker is invoked for every request so the www->apex 301 always fires;
                          # Worker falls back to env.ASSETS.fetch(request) for non-API paths.

[[durable_objects.bindings]]
name = "CHAT_DO"
class_name = "ChatDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatDurableObject"]

[[kv_namespaces]]
binding = "PAIR_KV"
id = "6fcdb9505f094699a18e7a53a244f8a4"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "whisperoni-media"

[observability]
enabled = true
head_sampling_rate = 1.0

# [limits] removed — Free plan does not allow cpu_ms override. The default Standard
# pricing model's CPU budget is well above what /media/upload + R2 purge needs.

# Custom-domain routes. Wrangler manages the apex + www DNS records automatically on deploy.
# The Worker 301-redirects www.whisperoni.com/* to the apex (see src/worker.js).

[[routes]]
pattern = "whisperoni.com"
custom_domain = true

[[routes]]
pattern = "www.whisperoni.com"
custom_domain = true
